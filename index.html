<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Deaver Clicker</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="game">
    <header id="top-bar">
      <h1>Deaver Clicker 1.2.2</h1>
      <div id="gp-display">
        Grump Points: <span id="gp">0</span>
      </div>
      <div id="gps-display">
        GP per second: <span id="gps">0</span>
      </div>
    </header>

    <main id="main-layout">
      <section id="click-area">
        <button id="deaver-button">
          <img id="deaver-face" src="img/deaver.PNG" alt="Deaver">
        </button>
      </section>

      <section id="sidebar">
        <h2>Buildings</h2>
        <div id="buildings-list"></div>

        <h2 style="margin-top:20px;">Upgrades</h2>
        <button id="open-upgrades">
          Upgrades
          <span id="upgrade-dot"></span>
        </button>

        <!-- NEW: Stock Market Button -->
        <button id="open-market" style="margin-top:10px; display:none;">
          Stock Market
        </button>

        <!-- Upgrade Panel -->
        <div id="upgrade-overlay">
          <div id="upgrade-sidebar">
            <h2>Upgrades</h2>
            <div id="upgrade-list"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- NEW: Stock Market Panel -->
  <div id="market-overlay">
    <div id="market-sidebar">
      <h2>Band Stock Market</h2>
      <p>Buy low, sell high. Totally not rigged.</p>

      <div id="market-price">Price: 100 GP</div>
      <p id="market-owned">Shares Owned: 0</p>

      <h3>Buy</h3>
      <div class="market-amount-row">
        <button class="market-buy-btn" data-amount="1">1×</button>
        <button class="market-buy-btn" data-amount="10">10×</button>
        <button class="market-buy-btn" data-amount="100">100×</button>
        <button class="market-buy-btn" data-amount="max">MAX</button>
      </div>
      <button id="market-buy">Buy</button>

      <h3>Sell</h3>
      <div class="market-amount-row">
        <button class="market-sell-btn" data-amount="1">1×</button>
        <button class="market-sell-btn" data-amount="10">10×</button>
        <button class="market-sell-btn" data-amount="100">100×</button>
        <button class="market-sell-btn" data-amount="max">MAX</button>
      </div>
      <button id="market-sell">Sell</button>

      <button id="close-market">Close</button>
    </div>
  </div>

  <div id="achievement-popup-container"></div>

  <!-- TEMP wipe button -->
  <button id="wipe-save-btn" style="
    position: fixed;
    bottom: 20px;
    left: 20px;
    padding: 10px 16px;
    background: #c62828;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    z-index: 9999;
  ">
    Wipe Save (TEMP)
  </button>

  <script src="js/data.js"></script>
  <script src="js/save.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
