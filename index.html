<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Deaver Clicker</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="game">
    <header id="top-bar">
      <h1>Deaver Clicker 1.1.7</h1>
      <div id="gp-display">
        Grump Points: <span id="gp">0</span>
      </div>
      <div id="gps-display">
        GP per second: <span id="gps">0</span>
      </div>
    </header>

    <main id="main-layout">
      <section id="click-area">
        <button id="deaver-button">
          <!-- replace with an image later -->
          <img id="deaver-face" src="img/deaver.PNG" alt="Deaver">
        </button>
      </section>

      <section id="sidebar">
        <h2>Buildings</h2>
        <div id="buildings-list"></div>

        <h2 style="margin-top:20px;">Upgrades</h2>
        <button id="open-upgrades">
          Upgrades
          <span id="upgrade-dot"></span>
        </button>

        <div id="upgrade-overlay">
          <div id="upgrade-sidebar">
            <h2>Upgrades</h2>
            <div id="upgrade-list"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="achievement-popup-container"></div>

  <script src="js/data.js"></script>
  <script src="js/save.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
